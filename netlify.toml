[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' pagead2.googlesyndication.com adservice.google.com www.googletagservices.com partner.googleadservices.com tpc.googlesyndication.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; frame-src https://widget.spreaker.com pagead2.googlesyndication.com googleads.g.doubleclick.net; connect-src 'self' https:; media-src 'self' https:;"
